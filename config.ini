# Coffee Analytics Copilot - Configuration File

# Data Agent Configuration
[DataAgent]
sample_size = 1000
data_formats = ['csv', 'xlsx', 'json']
outlier_threshold = 3  # Standard deviations

# Analysis Agent Configuration
[AnalysisAgent]
segmentation_quantiles = 3
correlation_threshold = 0.5
statistical_significance = 0.05

# Forecast Agent Configuration
[ForecastAgent]
default_forecast_periods = 30
moving_average_window = 7
exponential_smoothing_alpha = 0.3
forecast_methods = ['linear', 'exponential']

# Recommender Agent Configuration
[RecommenderAgent]
top_recommendations = 5
risk_threshold = 0.3
revenue_concentration_threshold = 0.4

# Supervisor Configuration
[Supervisor]
enable_logging = true
log_level = 'INFO'
export_format = 'json'
default_output_file = 'analysis_results.json'
